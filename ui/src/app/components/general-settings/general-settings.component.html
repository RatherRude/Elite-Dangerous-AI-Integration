<div class="general-dashboard">
    @if (config) {
        <section class="dashboard-hero">
            <div>
                <p class="dashboard-eyebrow">Current Configuration</p>
                <h2>General</h2>
                <p>Quick view of the core settings COVAS:NEXT will use when it starts.</p>
            </div>
        </section>

        <div class="summary-grid">
            <button
                type="button"
                class="summary-card character-card"
                (click)="openTarget('character')"
                matTooltip="Open Character settings">
                <img [src]="avatarUrl" [alt]="characterName + ' avatar'" class="summary-avatar">
                <span class="summary-copy">
                    <span class="summary-label">Character</span>
                    <strong>{{ characterName }}</strong>
                </span>
                <mat-icon class="summary-action">chevron_right</mat-icon>
            </button>
        </div>

        <div class="launcher-info-line" aria-label="General settings quick links">
            <button
                type="button"
                class="info-chip"
                (click)="openTarget('commander')"
                matTooltip="Open Commander and Main API Key settings">
                <mat-icon>badge</mat-icon>
                <span>CMDR</span>
                <strong>{{ commanderName }}</strong>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('audio-input')"
                matTooltip="Open STT settings">
                <mat-icon>mic</mat-icon>
                <span>Input</span>
                <strong>{{ inputDeviceName }}</strong>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('audio-output')"
                matTooltip="Open TTS settings">
                <mat-icon>volume_up</mat-icon>
                <span>Output</span>
                <strong>{{ outputDeviceName }}</strong>
                <small>{{ outputLevelLabel }}</small>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('overlay')"
                matTooltip="Open Overlay settings">
                <mat-icon>picture_in_picture_alt</mat-icon>
                <span>Overlay</span>
                <strong>{{ overlayModeLabel }}</strong>
            </button>
        </div>
    }
</div>
