<div class="general-dashboard">
    @if (config) {
        <div class="launcher-info-line" aria-label="General settings quick links">
            <button
                type="button"
                class="info-chip"
                (click)="openTarget('commander')"
                matTooltip="Open Commander and Main API Key settings">
                <mat-icon>badge</mat-icon>
                <span>CMDR</span>
                <strong>{{ commanderName }}</strong>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('audio-input')"
                matTooltip="Open STT settings">
                <mat-icon>mic</mat-icon>
                <span>Input</span>
                <strong>{{ inputDeviceName }}</strong>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('audio-output')"
                matTooltip="Open TTS settings">
                <mat-icon>volume_up</mat-icon>
                <span>Output</span>
                <strong>{{ outputDeviceName }}</strong>
                <small>{{ outputLevelLabel }}</small>
            </button>

            <button
                type="button"
                class="info-chip"
                (click)="openTarget('overlay')"
                matTooltip="Open Overlay settings">
                <mat-icon>picture_in_picture_alt</mat-icon>
                <span>Overlay</span>
                <strong>{{ overlayModeLabel }}</strong>
            </button>
        </div>
    }
</div>
