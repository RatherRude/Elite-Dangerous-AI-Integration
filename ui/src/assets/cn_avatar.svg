<svg class="listening" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <linearGradient id="hull-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="50%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </linearGradient>
    
    <linearGradient id="plate-metal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#666666" />
      <stop offset="100%" stop-color="#404040" />
    </linearGradient>

    <linearGradient id="amber-glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#ff6600" />
    </linearGradient>
    
    <linearGradient id="cyan-glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#0099ff" />
    </linearGradient>

    <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Base hover animation */
    .robot-body {
      animation: hover 6s ease-in-out infinite;
    }
    .antenna-pod {
      animation: hover-offset 4s ease-in-out infinite alternate;
    }

    /* Transition defaults for smooth state switching */
    .eye-base {
      transform-origin: center;
      transform-box: fill-box;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), fill 0.4s ease;
      fill: url(#cyan-glow-grad);
    }
    .pupil {
      transform-origin: center;
      transform-box: fill-box;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0.9;
    }
    .mouth-glow {
      transform-origin: center;
      transform-box: fill-box;
      transition: transform 0.3s ease, opacity 0.3s ease, fill 0.3s ease;
      fill: url(#amber-glow-grad);
      opacity: 0.8;
    }
    .antenna-light {
      transition: fill 0.3s ease, opacity 0.3s ease;
      fill: #00ffff;
    }
    .scanline-group {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* =========================================
       STATE: LISTENING (Idle / Default)
       Friendly, attentive, slow pulsing lights
       ========================================= */
    .listening .eye-base { transform: scaleY(1); }
    .listening .mouth-glow { animation: pulse 3s infinite alternate; }
    .listening .antenna-light { animation: pulse 2s infinite alternate; }

    /* =========================================
       STATE: THINKING
       Squinting eyes (turns amber), rapid computing lights
       ========================================= */
    .thinking .eye-base {
      transform: scaleY(0.25);
      fill: url(#amber-glow-grad);
    }
    .thinking .pupil { opacity: 0; } /* Hide pupils when squinting */
    .thinking .mouth-glow { opacity: 0.3; transform: scaleY(0.8); }
    .thinking .antenna-light {
      fill: #ffcc00;
      animation: compute-blink 0.15s infinite alternate;
    }

    /* =========================================
       STATE: SPEAKING
       Mouth intake grill modulates rapidly
       ========================================= */
    .speaking .eye-base { transform: scaleY(0.9); }
    .speaking .mouth-glow {
      animation: talk-modulate 0.15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .speaking .antenna-light { animation: pulse 1s infinite alternate; }

    /* =========================================
       STATE: RESEARCHING (Scanning)
       Pupils dart left/right, scanline activates
       ========================================= */
    .researching .eye-base { transform: scaleY(0.85); }
    .researching .pupil { animation: scan-dart 2.5s infinite; }
    .researching .mouth-glow { opacity: 0.5; }
    .researching .scanline-group { opacity: 1; }
    .researching .scanline { animation: scan-sweep 2s linear infinite; }


    /* Keyframes */
    @keyframes hover {
      0%, 100% { transform: translate(200px, 250px); }
      50% { transform: translate(200px, 265px); }
    }
    @keyframes hover-offset {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }
    @keyframes pulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }
    @keyframes compute-blink {
      from { opacity: 0.1; }
      to { opacity: 1; }
    }
    @keyframes talk-modulate {
      0% { transform: scaleY(0.6); opacity: 0.6; }
      100% { transform: scaleY(1.3); opacity: 1; }
    }
    @keyframes scan-dart {
      0%, 10% { transform: translateX(0px); }
      15%, 45% { transform: translateX(-12px); }
      50%, 80% { transform: translateX(12px); }
      85%, 100% { transform: translateX(0px); }
    }
    @keyframes scan-sweep {
      0% { transform: translateY(-70px); }
      100% { transform: translateY(110px); }
    }
  </style>

  <g class="robot-body">
    
    <g transform="translate(0, 140)">
       <path d="M -60 0 L -80 60 L 80 60 L 60 0 Z" fill="url(#hull-metal)" stroke="#000" stroke-width="2"/>
       <rect x="-40" y="10" width="80" height="10" fill="url(#cyan-glow-grad)" filter="url(#glow-cyan)" opacity="0.7">
         <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2s" repeatCount="indefinite"/>
       </rect>
    </g>

    <g>
      <path d="M -110 -80 L -130 20 L -90 130 L 90 130 L 130 20 L 110 -80 L 0 -130 Z" fill="url(#hull-metal)" stroke="#111" stroke-width="3" />
      
      <g filter="url(#glow-amber)">
        <polygon points="-130,20 -120,30 -120,80 -135,70" fill="#ff6600" />
        <polygon points="130,20 120,30 120,80 135,70" fill="#ff6600" />
      </g>

      <path d="M -90 -70 L -100 10 L -70 110 L 0 130 L 70 110 L 100 10 L 90 -70 L 0 -110 Z" fill="url(#plate-metal)" stroke="#222" stroke-width="2" />
      <path d="M -90 -70 L 0 -30 L 90 -70" fill="none" stroke="#111" stroke-width="2" />
      <path d="M -100 10 L 0 30 L 100 10" fill="none" stroke="#111" stroke-width="2" />

      <g transform="translate(0, -20)">
        
        <path d="M -60 80 Q 0 130 60 80 L 50 110 Q 0 150 -50 110 Z" fill="#222" stroke="#ff9900" stroke-width="2" />
        
        <path class="mouth-glow" d="M -55 85 Q 0 125 55 85 L 48 105 Q 0 140 -48 105 Z" filter="url(#glow-amber)" />
        
        <g stroke="#333" stroke-width="2">
           <line x1="-30" y1="95" x2="-30" y2="120" />
           <line x1="-10" y1="105" x2="-10" y2="130" />
           <line x1="10" y1="105" x2="10" y2="130" />
           <line x1="30" y1="95" x2="30" y2="120" />
        </g>

        <path d="M -80 60 Q -40 80 0 70 Q 40 80 80 60 L 70 30 L -70 30 Z" fill="url(#plate-metal)" stroke="#222" stroke-width="2"/>

        <ellipse cx="-45" cy="25" rx="30" ry="22" fill="#001a22" />
        <ellipse cx="45" cy="25" rx="30" ry="22" fill="#001a22" />

        <g filter="url(#glow-cyan)">
          <ellipse class="eye-base" cx="-45" cy="25" rx="25" ry="17" />
          <ellipse class="eye-base" cx="45" cy="25" rx="25" ry="17" />
          
          <circle class="pupil" cx="-45" cy="25" r="8" fill="#e6ffff" />
          <circle class="pupil" cx="45" cy="25" r="8" fill="#e6ffff" />
        </g>
      </g>

      <g class="scanline-group" filter="url(#glow-cyan)">
        <rect class="scanline" x="-100" y="0" width="200" height="4" fill="#00ffff" opacity="0.8" />
      </g>

      <g class="antenna-pod">
        <path d="M -80 -100 L -100 -150 L -70 -160 L -50 -110 Z" fill="url(#plate-metal)" stroke="#111" stroke-width="2" />
        <circle class="antenna-light" cx="-85" cy="-155" r="5" filter="url(#glow-cyan)" />
        <path d="M 80 -100 L 100 -150 L 70 -160 L 50 -110 Z" fill="url(#plate-metal)" stroke="#111" stroke-width="2" />
        <circle class="antenna-light" cx="85" cy="-155" r="5" filter="url(#glow-cyan)" />
      </g>
    </g>
  </g>
</svg>
