name: Build and Test Executable

on: [push, pull_request]

permissions:
  contents: read

jobs:
  pyinstaller-build:
    name: Build Executable
    runs-on: windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install --force-reinstall -r requirements.txt
          python -m pip install --force-reinstall numpy==2.2.2 opencv-python==4.10.0.84

      - name: Run tests
        run: |
          python -m pytest --timeout 10 test -v --capture=no

      - name: Install pyinstaller
        run: |
          $Env:CL = "/Od"
          $Env:PYINSTALLER_COMPILE_BOOTLOADER = "true"
          python -m pip install --force-reinstall --ignore-installed --no-binary :all: --no-cache pyinstaller@git+https://github.com/pyinstaller/pyinstaller.git@0d562b5
          $Env:CL = ""

      - name: Create Executable for Chat
        run: |
          .\e2e\build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: COVAS_NEXT_v${{ github.sha }}
          path: ./dist
        # output the upload URL for later use
        id: upload-artifact

  electron-build:
    name: Build Electron App
    needs: pyinstaller-build
    runs-on: windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: COVAS_NEXT_v${{ github.sha }}
          path: dist

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install electron dependencies
        working-directory: .
        run: npm run install:electron

      - name: Install frontend dependencies
        working-directory: .
        run: npm run install:ui

      - name: Replace Commit HASH in environment.prod.ts
        working-directory: ui
        run: |
          $content = Get-Content -Path src/environments/environment.prod.ts -Raw
          $newContent = $content -replace '__COMMIT_HASH_PLACEHOLDER__', '${{ github.sha }}'
          Set-Content -Path src/environments/environment.prod.ts -Value $newContent
        shell: pwsh

      - name: Build UI
        working-directory: .
        run: npm run build:ui
        env:
          COMMIT_HASH: ${{ github.sha }}

      - name: Build Electron App
        working-directory: .
        run: npm run package

      - name: Create simple zip with only required files
        run: |
          $SHORT_HASH = "${{ github.sha }}".Substring(0, 7)
          # Create a temporary directory for the files
          New-Item -ItemType Directory -Path .\simple-zip -Force
          New-Item -ItemType Directory -Path .\simple-zip\files -Force
          # Copy only the executable and resources folder
          Copy-Item -Path .\dist\win-unpacked\* -Destination .\simple-zip\files -Recurse
          # Create a link from .\simple-zip\covas-next.lnk to the executable .\simple-zip\files\com.covasnext.ui.exe
          cd .\simple-zip
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("covas-next.lnk")
          $Shortcut.TargetPath = "%COMSPEC% /C start .\files\com.covasnext.ui.exe"
          $Shortcut.Save()

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: COVAS_NEXT_MSI_v${{ github.sha }}
          path: .\dist\*.msi

      - name: Upload simple zip file
        uses: actions/upload-artifact@v4
        with:
          name: COVAS_NEXT_DIR_v${{ github.sha }}
          path: .\simple-zip

  e2e:
    name: E2E Tests
    # This is required to run in a fresh VM to check if all python deps are bundled in the exe
    # and to ensure Windows Defender considers the executable as downloaded from the internet
    runs-on: windows-latest
    needs: pyinstaller-build
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: COVAS_NEXT_v${{ github.sha }}
          path: dist

      - name: Run e2e tests
        run: |
          python --version
          python e2e/test_ChatExecutable.py

  draft-release:
    name: Add Windows Artifacts to Draft Release
    needs: [electron-build, e2e]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: COVAS_NEXT_MSI_v${{ github.sha }}
          path: release-assets

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          ensure_draft_release() {
            if gh release view "$TAG" >/dev/null 2>&1; then
              if [ "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" != "true" ]; then
                echo "Release $TAG already exists and is not a draft. Refusing to attach assets."
                exit 1
              fi
              return
            fi

            gh release create "$TAG" --draft --title "$TAG" --notes "Draft release for $TAG" || {
              gh release view "$TAG" >/dev/null
              if [ "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" != "true" ]; then
                echo "Release $TAG already exists and is not a draft. Refusing to attach assets."
                exit 1
              fi
            }
          }

          ensure_draft_release
          gh release upload "$TAG" release-assets/* --clobber
